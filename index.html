<!DOCTYPE html>
<html>
<head>
<title>Flappy Bird</title>

<style>

body{
    margin:0;
    background:#70c5ce;
    font-family:Arial;
    text-align:center;
}

canvas{
    display:block;
    margin:auto;
    background:#70c5ce;
}

h2{
    color:white;
}

</style>

</head>

<body>

<h2>Flappy Bird 🐦 (Press SPACE to Jump)</h2>

<canvas id="game" width="400" height="500"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let birdX = 80;
let birdY = 150;
let gravity = 0.5;
let velocity = 0;

let pipes = [];

let pipeWidth = 60;
let gap = 140;

let score = 0;
let gameOver = false;


document.addEventListener("keydown", jump);
document.addEventListener("click", jump);


function jump(){

if(gameOver){

restartGame();
return;

}

velocity = -8;

}


function createPipe(){

let topHeight = Math.random()*250 + 50;

pipes.push({

x:400,
top:topHeight,
bottom:topHeight + gap

});

}


function drawBird(){

ctx.fillStyle="yellow";

ctx.beginPath();

ctx.arc(birdX,birdY,15,0,Math.PI*2);

ctx.fill();

}


function drawPipe(pipe){

ctx.fillStyle="green";

ctx.fillRect(pipe.x,0,pipeWidth,pipe.top);

ctx.fillRect(pipe.x,pipe.bottom,pipeWidth,500);

}


function drawScore(){

ctx.fillStyle="white";

ctx.font="24px Arial";

ctx.fillText("Score: "+score,10,30);

}


function collision(pipe){

if(

birdX+15 > pipe.x &&
birdX-15 < pipe.x+pipeWidth &&
(

birdY-15 < pipe.top ||
birdY+15 > pipe.bottom

)

){

return true;

}

return false;

}


function update(){

if(gameOver) return;


velocity += gravity;

birdY += velocity;


if(birdY > 500 || birdY < 0){

endGame();

}


for(let i=0;i<pipes.length;i++){

pipes[i].x -= 2;


if(collision(pipes[i])){

endGame();

}


if(pipes[i].x === 80){

score++;

}

}


if(pipes.length === 0 || pipes[pipes.length-1].x < 200){

createPipe();

}

}


function draw(){

ctx.clearRect(0,0,400,500);


drawBird();


for(let pipe of pipes){

drawPipe(pipe);

}


drawScore();


if(gameOver){

ctx.fillStyle="white";

ctx.font="40px Arial";

ctx.fillText("Game Over",120,250);

ctx.font="20px Arial";

ctx.fillText("Press SPACE or Click",130,300);

}

}


function endGame(){

gameOver = true;

}


function restartGame(){

birdY = 150;

velocity = 0;

pipes = [];

score = 0;

gameOver = false;

}


function gameLoop(){

update();

draw();

requestAnimationFrame(gameLoop);

}


gameLoop();

</script>

</body>
</html>
